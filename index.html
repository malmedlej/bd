<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BD Pulse - Business Development Command Center</title>

    <!-- PWA -->
    <link rel="manifest" href="/bd/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="BD Pulse" />
    <link rel="apple-touch-icon" href="/bd/icons/icon-192.svg" />

    <!-- SEO / Social -->
    <meta name="description" content="BD Pulse - Business Development Command Center" />
    <meta property="og:title" content="BD Pulse" />
    <meta property="og:description" content="Internal Business Development Tool." />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const basePath = '/bd/';
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            registrations.forEach((registration) => {
              const scopePath = new URL(registration.scope).pathname;
              if (!scopePath.startsWith(basePath)) registration.unregister();
            });
          }).finally(() => {
            navigator.serviceWorker.register(`${basePath}sw.js`, { scope: basePath }).catch(() => {});
          });
        });
      }
    </script>
  </body>
</html>
